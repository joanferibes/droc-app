<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema DROC – Joanfe Ribes</title>
<style>
:root{--verde:#4A8A80;--verde-fondo:#e8f4f2;--gris:#2c2c2c;--gris-medio:#6b7280;--gris-claro:#f4f6f5;--borde:#d1e0de;--rojo:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:var(--gris-claro);color:var(--gris);}
.header{background:var(--verde);color:white;padding:14px 24px;}
.header h1{font-size:1.1rem;font-weight:bold;}
.header p{font-size:0.78rem;opacity:0.85;}
.tabs{display:flex;background:white;border-bottom:2px solid var(--borde);padding:0 24px;}
.tab{padding:12px 20px;cursor:pointer;font-size:0.88rem;font-weight:600;color:var(--gris-medio);border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--verde);border-bottom-color:var(--verde);}
.panel{display:none;padding:24px;max-width:1000px;}
.panel.active{display:block;}
.card{background:white;border-radius:10px;border:1px solid var(--borde);padding:20px;margin-bottom:20px;}
.card-title{font-size:0.8rem;font-weight:bold;color:var(--verde);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
label{font-size:0.78rem;font-weight:600;color:var(--gris-medio);display:block;margin-bottom:5px;}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--borde);border-radius:6px;font-size:0.88rem;color:var(--gris);background:white;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:600;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--verde);color:white;}
.btn-primary:hover{background:#3d7068;}
.btn-secondary{background:var(--verde-fondo);color:var(--verde);border:1px solid var(--borde);}
.btn-danger{background:#fdf2f2;color:var(--rojo);border:1px solid #f5c6c6;}
.btn-small{padding:5px 10px;font-size:0.78rem;}
.mun-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:12px;}
.mun-card{background:var(--verde-fondo);border:1px solid var(--borde);border-radius:8px;padding:14px;}
.mun-card h3{font-size:0.92rem;font-weight:bold;color:var(--verde);margin-bottom:8px;}
.mun-card pre{font-size:0.75rem;color:var(--gris-medio);white-space:pre-wrap;line-height:1.5;max-height:100px;overflow:hidden;}
.mun-card-actions{display:flex;gap:8px;margin-top:10px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
th{background:var(--verde-fondo);color:var(--verde);font-weight:bold;text-align:left;padding:9px 12px;border-bottom:2px solid var(--borde);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--borde);vertical-align:top;}
tr:hover td{background:#f9fcfc;}
.badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:0.72rem;font-weight:600;}
.badge-nuevo{background:#fef3c7;color:#92400e;}
.badge-borrador{background:#dcfce7;color:#166534;}
.badge-enviada{background:#dbeafe;color:#1e40af;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--verde);color:white;padding:13px 20px;border-radius:8px;font-size:0.88rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.2);display:none;z-index:9999;max-width:360px;}
.toast.error{background:var(--rojo);}
.toast.show{display:block;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:12px;padding:28px;max-width:620px;width:95%;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:1rem;font-weight:bold;color:var(--verde);margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.empty{text-align:center;padding:48px 24px;color:var(--gris-medio);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <h1>Sistema DROC — Joanfe Ribes Oficina Tècnica</h1>
  <p>Gestió de Declaracions Responsables de Segona Ocupació</p>
</div>
<div class="tabs">
  <div class="tab active" onclick="cambiarTab('solicitudes')">📋 Solicitudes</div>
  <div class="tab" onclick="cambiarTab('nueva')">➕ Nueva</div>
  <div class="tab" onclick="cambiarTab('municipios')">🏛️ Municipios</div>
</div>

<div class="panel active" id="panel-solicitudes">
  <div class="card">
    <div class="card-title"><span>Solicitudes recibidas</span><button class="btn btn-secondary btn-small" onclick="cargarSolicitudes()">🔄 Actualizar</button></div>
    <div id="tabla-solicitudes"><div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div></div>
  </div>
</div>

<div class="panel" id="panel-nueva">
  <div class="card">
    <div class="card-title">Nueva solicitud DROC</div>
    <div class="form-grid">
      <div><label>Nombre completo *</label><input type="text" id="ns-nombre" placeholder="Nombre y apellidos"></div>
      <div><label>Email</label><input type="email" id="ns-email" placeholder="cliente@email.com"></div>
      <div><label>Tipo doc</label><select id="ns-tipodoc"><option value="DNI">DNI</option><option value="NIE">NIE</option><option value="Pasaporte">Pasaporte</option></select></div>
      <div><label>Nº documento *</label><input type="text" id="ns-numdoc" placeholder="12345678A"></div>
      <div><label>Teléfono</label><input type="tel" id="ns-telefono" placeholder="600 000 000"></div>
      <div><label>Intermediario</label><input type="text" id="ns-intermediario" placeholder="Inmobiliaria / gestor"></div>
      <div class="form-full"><label>Dirección *</label><input type="text" id="ns-direccion" placeholder="C/ Exemple, 12, 1º"></div>
      <div><label>CP</label><input type="text" id="ns-cp" placeholder="03760"></div>
      <div><label>Municipio</label><input type="text" id="ns-municipio" placeholder="Pedreguer"></div>
      <div><label>Ref. catastral</label><input type="text" id="ns-refcat" placeholder="0000000XX0000X0000XX"></div>
      <div><label>Municipio expediente *</label><select id="ns-municipioexp"><option value="">— Selecciona —</option></select></div>
      <div class="form-full"><label>Observaciones</label><textarea id="ns-observaciones" rows="3"></textarea></div>
    </div>
    <div style="margin-top:18px;display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="guardarNuevaSolicitud()">💾 Guardar</button>
      <button class="btn btn-secondary" onclick="limpiarFormulario()">🗑️ Limpiar</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-municipios">
  <div class="card">
    <div class="card-title"><span>Municipios</span><button class="btn btn-primary btn-small" onclick="abrirModalMunicipio(null)">➕ Nuevo</button></div>
    <div class="mun-grid" id="lista-municipios"><div class="empty"><div class="empty-icon">🏛️</div><p>Cargando...</p></div></div>
  </div>
</div>

<div class="modal-overlay" id="modal-solicitud">
  <div class="modal">
    <h2>✏️ Editar solicitud</h2>
    <input type="hidden" id="edit-fila">
    <div class="form-grid">
      <div><label>Nombre</label><input type="text" id="edit-nombre"></div>
      <div><label>Email</label><input type="email" id="edit-email"></div>
      <div><label>Tipo doc</label><select id="edit-tipodoc"><option value="DNI">DNI</option><option value="NIE">NIE</option><option value="Pasaporte">Pasaporte</option></select></div>
      <div><label>Nº documento</label><input type="text" id="edit-numdoc"></div>
      <div><label>Teléfono</label><input type="tel" id="edit-telefono"></div>
      <div><label>Intermediario</label><input type="text" id="edit-intermediario"></div>
      <div class="form-full"><label>Dirección</label><input type="text" id="edit-direccion"></div>
      <div><label>CP</label><input type="text" id="edit-cp"></div>
      <div><label>Municipio</label><input type="text" id="edit-municipio"></div>
      <div><label>Ref. catastral</label><input type="text" id="edit-refcat"></div>
      <div><label>Municipio expediente</label><select id="edit-municipioexp"><option value="">— Selecciona —</option></select></div>
      <div class="form-full"><label>Observaciones</label><textarea id="edit-observaciones" rows="3"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cerrarModal('modal-solicitud')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()">💾 Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-municipio">
  <div class="modal">
    <h2 id="modal-mun-titulo">Nuevo municipio</h2>
    <div style="margin-bottom:14px;"><label>Nombre *</label><input type="text" id="mun-nombre" placeholder="Ej: Pedreguer"></div>
    <div style="margin-bottom:14px;"><label>Documentación a aportar</label><textarea id="mun-docs" rows="8" placeholder="- DNI/NIE titular&#10;- Escritura de propiedad"></textarea></div>
    <div style="margin-bottom:14px;"><label>Notas internas</label><textarea id="mun-notas" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cerrarModal('modal-municipio')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarMunicipio()">💾 Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4G6fpkSRdRF9tr9Fe9OSimyIoq0AW8hbFGwLvUfu_Snl9A--IgAE-DMYhc760ldXcDg/exec";
let municipios = [], solicitudes = [], _cbCount = 0;

window.onload = () => { cargarMunicipios(); cargarSolicitudes(); };

// JSONP para GET (evita CORS)
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + (++_cbCount);
    const script = document.createElement('script');
    const timeout = setTimeout(() => { delete window[cbName]; script.remove(); reject(new Error('Timeout')); }, 15000);
    window[cbName] = (data) => { clearTimeout(timeout); delete window[cbName]; script.remove(); resolve(data); };
    const qs = new URLSearchParams({...params, callback: cbName}).toString();
    script.src = SCRIPT_URL + '?' + qs;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); reject(new Error('Script error')); };
    document.head.appendChild(script);
  });
}

// POST via fetch para escritura
async function apiPost(data) {
  try {
    const r = await fetch(SCRIPT_URL, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)});
    return await r.json();
  } catch(e) { return {ok:false, msg:"Error: "+e.message}; }
}

// GET via JSONP para lectura
async function apiGet(params) {
  try {
    return await jsonp(params);
  } catch(e) { return {ok:false, msg:"Error JSONP: "+e.message}; }
}

function toast(msg, tipo="ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show"+(tipo==="error"?" error":"");
  setTimeout(() => el.classList.remove("show"), 3500);
}

function cerrarModal(id) { document.getElementById(id).classList.remove("show"); }

function cambiarTab(tab) {
  const ids = ["solicitudes","nueva","municipios"];
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", ids[i]===tab));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-"+tab).classList.add("active");
}

async function cargarSolicitudes() {
  document.getElementById("tabla-solicitudes").innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div>';
  const res = await apiGet({accion:"get_solicitudes"});
  solicitudes = res.solicitudes || [];
  renderSolicitudes();
}

function renderSolicitudes() {
  const cont = document.getElementById("tabla-solicitudes");
  if (!solicitudes.length) { cont.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><p>No hay solicitudes todavía.</p></div>'; return; }
  const badge = e => e==="Borrador" ? '<span class="badge badge-borrador">Borrador ✓</span>' : e==="Enviada" ? '<span class="badge badge-enviada">Enviada</span>' : '<span class="badge badge-nuevo">🔔 Nuevo</span>';
  cont.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Cliente</th><th>Documento</th><th>Dirección</th><th>Municipio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>' +
    solicitudes.map(s => '<tr><td style="white-space:nowrap;">'+s.fechaRecepcion+'</td><td><strong>'+s.nombre+'</strong><br><small>'+(s.email||s.telefono||"")+'</small></td><td style="white-space:nowrap;">'+s.tipoDoc+' '+s.numDoc+'</td><td>'+s.direccion+'<br><small>'+(s.cp?s.cp+" · ":"")+s.municipio+'</small></td><td>'+(s.municipioExp||s.municipio||"—")+'</td><td>'+badge(s.estado)+'</td><td style="white-space:nowrap;"><button class="btn btn-secondary btn-small" onclick=\'abrirEdicion('+JSON.stringify(s)+')\' style="margin-bottom:4px;">✏️</button> <button class="btn btn-secondary btn-small" onclick="generarBorrador('+s.fila+',this)" style="margin-bottom:4px;">📧</button> <button class="btn btn-danger btn-small" onclick="eliminarSolicitud('+s.fila+',this)">🗑️</button></td></tr>').join("") +
    '</tbody></table></div>';
}

async function generarBorrador(fila, btn) {
  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--verde);border-color:var(--borde);"></span>';
  btn.disabled = true;
  const res = await apiPost({accion:"generar_borrador", fila});
  btn.innerHTML = "📧"; btn.disabled = false;
  if (res.ok) { toast("Borrador creado en Gmail ✓"); cargarSolicitudes(); }
  else toast(res.msg||"Error.","error");
}

async function eliminarSolicitud(fila, btn) {
  if (!confirm("¿Eliminar esta solicitud?")) return;
  btn.disabled = true;
  const res = await apiPost({accion:"eliminar_solicitud", fila});
  if (res.ok) { toast("Eliminada."); cargarSolicitudes(); }
  else toast(res.msg||"Error.","error");
}

function abrirEdicion(s) {
  llenarSelectMunicipios();
  document.getElementById("edit-fila").value = s.fila;
  document.getElementById("edit-nombre").value = s.nombre||"";
  document.getElementById("edit-email").value = s.email||"";
  document.getElementById("edit-tipodoc").value = s.tipoDoc||"DNI";
  document.getElementById("edit-numdoc").value = s.numDoc||"";
  document.getElementById("edit-telefono").value = s.telefono||"";
  document.getElementById("edit-intermediario").value = s.intermediario||"";
  document.getElementById("edit-direccion").value = s.direccion||"";
  document.getElementById("edit-cp").value = s.cp||"";
  document.getElementById("edit-municipio").value = s.municipio||"";
  document.getElementById("edit-refcat").value = s.refCatastral||"";
  document.getElementById("edit-municipioexp").value = s.municipioExp||"";
  document.getElementById("edit-observaciones").value = s.observaciones||"";
  document.getElementById("modal-solicitud").classList.add("show");
}

async function guardarEdicion() {
  const res = await apiPost({accion:"editar_solicitud", fila:document.getElementById("edit-fila").value, nombre:document.getElementById("edit-nombre").value, email:document.getElementById("edit-email").value, tipoDoc:document.getElementById("edit-tipodoc").value, numDoc:document.getElementById("edit-numdoc").value, telefono:document.getElementById("edit-telefono").value, intermediario:document.getElementById("edit-intermediario").value, direccion:document.getElementById("edit-direccion").value, cp:document.getElementById("edit-cp").value, municipio:document.getElementById("edit-municipio").value, refCatastral:document.getElementById("edit-refcat").value, municipioExp:document.getElementById("edit-municipioexp").value, observaciones:document.getElementById("edit-observaciones").value});
  if (res.ok) { toast("Actualizada ✓"); cerrarModal("modal-solicitud"); cargarSolicitudes(); }
  else toast(res.msg||"Error.","error");
}

async function guardarNuevaSolicitud() {
  const nombre = document.getElementById("ns-nombre").value.trim();
  const numDoc = document.getElementById("ns-numdoc").value.trim();
  const direccion = document.getElementById("ns-direccion").value.trim();
  if (!nombre||!numDoc||!direccion) { toast("Rellena nombre, nº documento y dirección.","error"); return; }
  const btn = document.querySelector("#panel-nueva .btn-primary");
  btn.innerHTML = '<span class="spinner"></span> Guardando...'; btn.disabled = true;
  const res = await apiPost({accion:"nueva_solicitud", nombre, tipoDoc:document.getElementById("ns-tipodoc").value, numDoc, telefono:document.getElementById("ns-telefono").value.trim(), email:document.getElementById("ns-email").value.trim(), direccion, municipio:document.getElementById("ns-municipio").value.trim(), cp:document.getElementById("ns-cp").value.trim(), refCatastral:document.getElementById("ns-refcat").value.trim(), intermediario:document.getElementById("ns-intermediario").value.trim(), municipioExp:document.getElementById("ns-municipioexp").value, observaciones:document.getElementById("ns-observaciones").value.trim()});
  btn.innerHTML = "💾 Guardar"; btn.disabled = false;
  if (res.ok) { toast(res.msg); limpiarFormulario(); cambiarTab("solicitudes"); cargarSolicitudes(); }
  else toast(res.msg||"Error.","error");
}

function limpiarFormulario() {
  ["ns-nombre","ns-numdoc","ns-telefono","ns-email","ns-direccion","ns-municipio","ns-cp","ns-refcat","ns-intermediario","ns-observaciones"].forEach(id => { const el=document.getElementById(id); if(el) el.value=""; });
  document.getElementById("ns-tipodoc").value = "DNI";
  document.getElementById("ns-municipioexp").value = "";
}

async function cargarMunicipios() {
  const res = await apiGet({accion:"get_municipios"});
  municipios = res.municipios || [];
  renderMunicipios();
  llenarSelectMunicipios();
}

function renderMunicipios() {
  const cont = document.getElementById("lista-municipios");
  if (!municipios.length) { cont.innerHTML = '<div class="empty"><div class="empty-icon">🏛️</div><p>No hay municipios.</p></div>'; return; }
  cont.innerHTML = municipios.map(m => '<div class="mun-card"><h3>'+m.nombre+'</h3><pre>'+(m.docs||"sin documentación")+'</pre>'+(m.notas?'<p style="font-size:0.72rem;color:var(--gris-medio);margin-top:6px;font-style:italic;">'+m.notas+'</p>':"")+'<div class="mun-card-actions"><button class="btn btn-secondary btn-small" onclick=\'abrirModalMunicipio('+JSON.stringify(m)+')\'>✏️ Editar</button><button class="btn btn-danger btn-small" onclick="eliminarMunicipio(\''+m.nombre+'\')">🗑️</button></div></div>').join("");
}

function llenarSelectMunicipios() {
  ["ns-municipioexp","edit-municipioexp"].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const val = sel.value;
    sel.innerHTML = '<option value="">— Selecciona —</option>'+municipios.map(m=>'<option value="'+m.nombre+'">'+m.nombre+'</option>').join("");
    sel.value = val;
  });
}

function abrirModalMunicipio(m) {
  document.getElementById("modal-mun-titulo").textContent = m ? "Editar: "+m.nombre : "Nuevo municipio";
  document.getElementById("mun-nombre").value = m ? m.nombre : "";
  document.getElementById("mun-nombre").disabled = !!m;
  document.getElementById("mun-docs").value = m ? m.docs : "";
  document.getElementById("mun-notas").value = m ? m.notas : "";
  document.getElementById("modal-municipio").classList.add("show");
}

async function guardarMunicipio() {
  const nombre = document.getElementById("mun-nombre").value.trim();
  const docs = document.getElementById("mun-docs").value.trim();
  const notas = document.getElementById("mun-notas").value.trim();
  if (!nombre) { toast("El nombre es obligatorio.","error"); return; }
  const res = await apiPost({accion:"guardar_municipio", nombre, docs, notas});
  if (res.ok) { toast(res.msg); cerrarModal("modal-municipio"); cargarMunicipios(); }
  else toast(res.msg||"Error.","error");
}

async function eliminarMunicipio(nombre) {
  if (!confirm('¿Eliminar "'+nombre+'"?')) return;
  const res = await apiPost({accion:"eliminar_municipio", nombre});
  if (res.ok) { toast(res.msg); cargarMunicipios(); }
  else toast(res.msg||"Error.","error");
}
</script>
</body>
</html>
